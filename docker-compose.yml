version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: solawi-postgres
    environment:
      POSTGRES_USER: solawi
      POSTGRES_PASSWORD: solawi_dev
      POSTGRES_DB: solawi_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solawi -d solawi_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solawi-network

  backend:
    build:
      context: ./packages/backend
      dockerfile: ../../docker/backend/Dockerfile.dev
    container_name: solawi-backend
    environment:
      DATABASE_URL: postgresql://solawi:solawi_dev@postgres:5432/solawi_manager
      JWT_SECRET: dev-secret-change-in-production
      SESSION_EXPIRY_DAYS: 30
      MAGIC_LINK_EXPIRY_MINUTES: 15
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      EMAIL_FROM: noreply@solawi-manager.local
      FRONTEND_URL: http://localhost:3000
      WEBAUTHN_RP_NAME: Solawi Manager
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./packages/backend/src:/app/src
      - ./packages/backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - solawi-network

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: ../../docker/frontend/Dockerfile.dev
    container_name: solawi-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./packages/frontend/src:/app/src
      - ./packages/frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - solawi-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: solawi-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - solawi-network

volumes:
  postgres_data:

networks:
  solawi-network:
    driver: bridge
